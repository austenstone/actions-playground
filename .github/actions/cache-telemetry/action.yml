name: 'Cache Telemetry'
description: >-
  Emits actions/cache hit/miss telemetry to Datadog. Drop in immediately
  after an `actions/cache` step and pass that step's `cache-hit` output.

inputs:
  cache-hit:
    description: 'The cache-hit output from the preceding actions/cache step ("true", "false", or "")'
    required: true
  cache-key:
    description: 'The cache key (or a stable prefix) for tagging'
    required: true
  cache-name:
    description: 'Logical cache name to tag (e.g. "pnpm-store", "next-build", "turbo")'
    required: true
  restore-duration-ms:
    description: 'Optional restore duration in milliseconds. If unset, no duration metric is emitted.'
    required: false
    default: ''
  datadog-api-key:
    description: 'Datadog API key. Required to actually ship metrics. If empty, the action only logs to the job summary (dry-run mode, useful for forks).'
    required: false
    default: ''
  datadog-site:
    description: 'Datadog site (e.g. datadoghq.com, datadoghq.eu, us3.datadoghq.com)'
    required: false
    default: 'datadoghq.com'
  extra-tags:
    description: 'Comma-separated extra Datadog tags, e.g. "service:next-js,env:ci"'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Emit cache telemetry
      shell: bash
      env:
        CACHE_HIT: ${{ inputs.cache-hit }}
        CACHE_KEY: ${{ inputs.cache-key }}
        CACHE_NAME: ${{ inputs.cache-name }}
        RESTORE_MS: ${{ inputs.restore-duration-ms }}
        DD_API_KEY: ${{ inputs.datadog-api-key }}
        DD_SITE: ${{ inputs.datadog-site }}
        EXTRA_TAGS: ${{ inputs.extra-tags }}
      run: |
        set -euo pipefail

        # Normalize hit value: "true" -> 1, anything else -> 0
        if [[ "${CACHE_HIT}" == "true" ]]; then
          HIT_VALUE=1
          HIT_TAG="hit:true"
        else
          HIT_VALUE=0
          HIT_TAG="hit:false"
        fi

        NOW=$(date +%s)

        # Stable, low-cardinality key prefix (everything before the first hash separator)
        # e.g. "Linux-pnpm-store-abc123def..." -> "Linux-pnpm-store"
        KEY_PREFIX=$(echo "${CACHE_KEY}" | cut -d- -f1-3)

        # Tag set kept intentionally low-cardinality. NEVER tag full cache key (high cardinality).
        TAGS="repo:${GITHUB_REPOSITORY},workflow:${GITHUB_WORKFLOW},job:${GITHUB_JOB},runner_os:${RUNNER_OS},cache_name:${CACHE_NAME},cache_key_prefix:${KEY_PREFIX},${HIT_TAG}"
        if [[ -n "${EXTRA_TAGS}" ]]; then
          TAGS="${TAGS},${EXTRA_TAGS}"
        fi

        # Job summary (always)
        {
          echo "### 📊 Cache Telemetry: \`${CACHE_NAME}\`"
          echo ""
          echo "| Field | Value |"
          echo "|---|---|"
          echo "| Cache hit | \`${CACHE_HIT:-<empty>}\` |"
          echo "| Key prefix | \`${KEY_PREFIX}\` |"
          echo "| Restore duration | ${RESTORE_MS:-<not measured>} ms |"
          echo "| Tags | \`${TAGS}\` |"
        } >> "${GITHUB_STEP_SUMMARY}"

        if [[ -z "${DD_API_KEY}" ]]; then
          echo "::notice::DD_API_KEY not provided — running in dry-run mode (job summary only)."
          exit 0
        fi

        # Build Datadog series payload (v2 metrics API).
        # Hit rate is later derived as sum(actions.cache.hit{hit:true}) / sum(actions.cache.hit).
        TS=${NOW}
        IFS=',' read -ra TAG_ARR <<< "${TAGS}"
        TAGS_JSON=$(printf '%s\n' "${TAG_ARR[@]}" | jq -R . | jq -s .)

        PAYLOAD=$(jq -n \
          --argjson ts "${TS}" \
          --argjson hit "${HIT_VALUE}" \
          --argjson tags "${TAGS_JSON}" \
          '{
            series: [
              {
                metric: "actions.cache.hit",
                type: 1,
                points: [{ timestamp: $ts, value: $hit }],
                tags: $tags
              },
              {
                metric: "actions.cache.lookup",
                type: 1,
                points: [{ timestamp: $ts, value: 1 }],
                tags: $tags
              }
            ]
          }')

        # Optionally include restore duration as a gauge
        if [[ -n "${RESTORE_MS}" ]]; then
          PAYLOAD=$(echo "${PAYLOAD}" | jq \
            --argjson ts "${TS}" \
            --argjson ms "${RESTORE_MS}" \
            --argjson tags "${TAGS_JSON}" \
            '.series += [{
              metric: "actions.cache.restore_duration_ms",
              type: 3,
              points: [{ timestamp: $ts, value: $ms }],
              tags: $tags
            }]')
        fi

        HTTP_CODE=$(curl -sS -o /tmp/dd-response.json -w "%{http_code}" \
          -X POST "https://api.${DD_SITE}/api/v2/series" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: ${DD_API_KEY}" \
          --data-binary "${PAYLOAD}")

        if [[ "${HTTP_CODE}" != "202" ]]; then
          echo "::warning::Datadog metric submission failed with HTTP ${HTTP_CODE}"
          cat /tmp/dd-response.json || true
          # Don't fail the job over telemetry
          exit 0
        fi

        echo "::notice::Datadog cache telemetry emitted (${HIT_TAG})"
