# Environment-Scoped Secrets Without Deployments (Workaround)
# Related: github/community #36919
#
# Problem: The only way to access environment-scoped secrets is by setting
# `environment:` on a job — but this ALSO creates a deployment entry in the
# repo's Deployments tab and environment history. There is no way to use
# environment secrets without triggering the deployment side-effect.
#
# Why this matters:
#   - CI jobs (lint, test, build) that need env-specific config pollute
#     the deployment history with non-deployment entries.
#   - No `environment.secrets` context exists independent of `environment:`.
#
# Workaround: Accept the deployment side-effect and use environments purely
# for secret scoping. The deployments are cosmetic — they don't affect anything
# functionally, but they do clutter the UI.
#
# Alternative: Store secrets at the repo level with a naming convention
# (e.g., DEV_API_KEY, PROD_API_KEY) and select via input. This avoids
# the deployment side-effect but loses environment protection rules.

name: "Exp: Environment Secrets Only"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment for secret scoping"
        required: true
        type: choice
        options:
          - dev
          - prod

jobs:
  # ── Using environment for secret scoping ──
  # This WILL create a deployment entry — that's the trade-off.
  # Environment protection rules (approvals, wait timers) also apply.
  use-env-secrets:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - name: Access environment-scoped secrets
        run: |
          echo "🔐 Running in environment: ${{ inputs.target_env }}"
          echo "API_URL length: ${#API_URL}"
          echo "API_KEY length: ${#API_KEY}"

          # These values differ per environment — dev and prod each have
          # their own API_URL and API_KEY configured in Settings > Environments.
          if [ -n "$API_URL" ]; then
            echo "✅ Environment secrets are accessible"
          else
            echo "⚠️ No secrets configured for '${{ inputs.target_env }}' environment"
          fi
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}

      - name: Show the deployment side-effect
        run: |
          echo "⚠️ Check the repo's Deployments tab — this job created a deployment"
          echo "   entry for the '${{ inputs.target_env }}' environment, even though"
          echo "   we only wanted the secrets, not an actual deployment."

  # ── Alternative: repo-level secrets with naming convention ──
  # No deployment side-effect, but no environment protection rules either.
  use-repo-secrets-alternative:
    runs-on: ubuntu-latest
    steps:
      - name: Access repo-level secrets by convention
        run: |
          echo "Using repo-level secrets with naming convention instead"
          echo "No deployment entry created for this approach"

          # Select the right secret based on input — but these are repo-level,
          # not scoped to an environment. Anyone with repo access can use them.
          if [ "${{ inputs.target_env }}" = "prod" ]; then
            echo "Would use PROD_API_KEY (repo secret)"
          else
            echo "Would use DEV_API_KEY (repo secret)"
          fi
