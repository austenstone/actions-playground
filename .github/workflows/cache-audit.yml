name: Cache Audit

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Organization to audit'
        required: true
        type: string
      top_n:
        description: 'Number of top repos to show detailed caches for'
        required: false
        default: '10'
        type: string
      sort_by:
        description: 'Sort repos by'
        required: false
        default: 'size'
        type: choice
        options:
          - size
          - count

permissions:
  actions: write
  contents: read

jobs:
  audit:
    name: Audit Cache Usage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run cache audit
        id: audit
        uses: ./.github/actions/cache-audit
        with:
          org: ${{ inputs.org }}
          top_n: ${{ inputs.top_n }}
          sort_by: ${{ inputs.sort_by }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cache-audit-report
          path: ${{ steps.audit.outputs.report_path }}
