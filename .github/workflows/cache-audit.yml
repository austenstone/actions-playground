name: Cache Audit

on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Organization to audit'
        required: true
        type: string
      top_n:
        description: 'Number of top repos to show detailed caches for'
        required: false
        default: '10'
        type: string
      sort_by:
        description: 'Sort repos by'
        required: false
        default: 'size'
        type: choice
        options:
          - size
          - count

permissions:
  actions: write
  contents: read

jobs:
  audit:
    name: Audit Cache Usage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Audit org cache usage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ inputs.org }}
          TOP_N: ${{ inputs.top_n }}
          SORT_BY: ${{ inputs.sort_by }}
        run: bash scripts/cache-audit.sh

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cache-audit-report
          path: cache-audit-report.md
