# Reusable Workflow Secrets Inheritance
# Related: github/community #23107, #150902
#
# `secrets: inherit` passes ALL of the caller's secrets to the reusable workflow
# automatically — no need to map them one-by-one. Inherited secrets are accessible
# even if the called workflow doesn't declare them under `secrets:`.
#
# Two approaches:
#   1. Explicit:        secrets: { MY_TOKEN: ${{ secrets.MY_TOKEN }} }
#   2. Inherit all:     secrets: inherit
#
# `secrets: inherit` also forwards GITHUB_TOKEN with the caller's permissions.

name: "Exp: Secrets Inherit (Caller)"

on:
  workflow_dispatch:

jobs:
  # ── Approach 1: Explicit secret passing ──
  # You must declare every secret the called workflow needs.
  call-with-explicit-secrets:
    uses: ./.github/workflows/exp-secrets-inherit-called.yml
    secrets:
      EXAMPLE_SECRET: ${{ secrets.EXAMPLE_SECRET }}

  # ── Approach 2: secrets: inherit ──
  # All secrets (org, repo, and environment) are forwarded automatically.
  # The called workflow can reference ANY secret the caller has access to,
  # even ones not declared in its `workflow_call.secrets` block.
  call-with-inherit:
    uses: ./.github/workflows/exp-secrets-inherit-called.yml
    secrets: inherit
