# Called/Reusable workflow for secrets inheritance demo
# When the caller uses `secrets: inherit`, ALL secrets are available here
# regardless of whether they are declared below.

name: "Exp: Secrets Inherit (Called)"

on:
  workflow_call:
    secrets:
      # Declaring a secret is optional when the caller uses `secrets: inherit`.
      # It's still good practice to declare expected secrets for documentation,
      # but inherited secrets work even without declaration.
      EXAMPLE_SECRET:
        required: false
        description: "Explicitly declared secret — works with both explicit passing and inherit"

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check declared secret
        run: |
          if [ -n "${{ secrets.EXAMPLE_SECRET }}" ]; then
            echo "✅ EXAMPLE_SECRET is available (length: ${#SECRET})"
          else
            echo "⚠️ EXAMPLE_SECRET is empty or not passed"
          fi
        env:
          SECRET: ${{ secrets.EXAMPLE_SECRET }}

      - name: Check undeclared secret (only works with inherit)
        run: |
          # This secret is NOT declared in workflow_call.secrets above.
          # It will only be available when the caller uses `secrets: inherit`.
          if [ -n "${{ secrets.UNDECLARED_SECRET }}" ]; then
            echo "✅ UNDECLARED_SECRET is available — secrets: inherit is working"
          else
            echo "⚠️ UNDECLARED_SECRET not available — caller likely used explicit secrets"
          fi
