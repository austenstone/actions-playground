name: "Job Restart Workarounds"

# Demonstrates 5 workaround strategies for restarting failed jobs
# while a workflow is still running (github.com/orgs/community/discussions/73156).
#
# Strategies:
#   1. orchestrator     — Each job is a separate workflow_dispatch, independently restartable
#   2. continue-on-error — Jobs mask failure; a retry-gate re-runs failures via API
#   3. step-retry       — Step-level retry loops (bash, nick-fields/retry, wretry.action)
#   4. matrix-retry     — Matrix attempts [1,2,3] with artifact success markers
#   5. watcher-rerun    — Separate watcher workflow does gh run rerun --failed

on:
  workflow_dispatch:
    inputs:
      strategy:
        description: "Which workaround strategy to demo"
        required: true
        type: choice
        options:
          - orchestrator
          - continue-on-error
          - step-retry
          - matrix-retry
          - watcher-rerun

permissions:
  actions: write
  contents: read

# ---------------------------------------------------------------------------
# STRATEGY 1: Orchestrator + Dispatched Sub-Workflows
#
# Each "job" is dispatched as its own workflow run via job-restart-child.yml.
# Because they're separate runs, each can be cancelled/restarted independently
# while siblings keep running — the exact UX the feature request asks for.
# ---------------------------------------------------------------------------
jobs:
  orchestrator:
    name: "S1 · Orchestrator"
    if: inputs.strategy == 'orchestrator'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispatch, monitor, and retry child workflows
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REF: ${{ github.head_ref || github.ref_name }}
          MAX_RETRIES: "2"
        run: |
          set -euo pipefail

          # --- Config: job_name -> sleep_seconds:fail_chance ---
          declare -A job_configs=(
            ["fast-job"]="5:30"
            ["slow-job"]="30:10"
            ["flaky-job"]="8:60"
          )

          # --- Helper: dispatch a child and return the run ID ---
          # Only the final line (run ID) goes to stdout; everything else to stderr
          dispatch_child() {
            local job_name=$1 sleep_s=$2 fail_pct=$3
            echo "🚀 Dispatching ${job_name} (sleep=${sleep_s}s, fail=${fail_pct}%)" >&2
            gh workflow run job-restart-child.yml \
              --ref "${REF}" \
              -f "job-name=${job_name}" \
              -f "sleep-seconds=${sleep_s}" \
              -f "fail-chance=${fail_pct}" >&2
            sleep 3
            # Grab the latest run ID for this workflow (only this goes to stdout)
            gh run list --workflow=job-restart-child.yml --limit=1 --json databaseId --jq '.[0].databaseId'
          }

          # --- Dispatch all children ---
          declare -A run_ids
          declare -A retries
          for job_name in "${!job_configs[@]}"; do
            IFS=':' read -r sleep_s fail_pct <<< "${job_configs[$job_name]}"
            run_ids[$job_name]=$(dispatch_child "$job_name" "$sleep_s" "$fail_pct")
            retries[$job_name]=0
            echo "   → Run ID: ${run_ids[$job_name]}"
          done

          echo ""
          echo "⏳ Monitoring all children — will retry failures immediately..."
          echo ""

          # --- Poll loop: check each child, retry on failure ---
          all_done=false
          while [ "${all_done}" = "false" ]; do
            sleep 10
            all_done=true

            for job_name in "${!run_ids[@]}"; do
              run_id=${run_ids[$job_name]}
              status=$(gh run view "${run_id}" --json status,conclusion --jq '.status')

              if [ "${status}" = "completed" ]; then
                conclusion=$(gh run view "${run_id}" --json conclusion --jq '.conclusion')

                if [ "${conclusion}" = "success" ]; then
                  echo "✅ ${job_name} (run ${run_id}) succeeded"
                elif [ "${retries[$job_name]}" -lt "${MAX_RETRIES}" ]; then
                  retries[$job_name]=$((retries[$job_name] + 1))
                  echo ""
                  echo "❌ ${job_name} (run ${run_id}) failed — retry ${retries[$job_name]}/${MAX_RETRIES}"
                  echo "   ↑ This is the key: re-dispatching immediately while other children still run!"
                  IFS=':' read -r sleep_s fail_pct <<< "${job_configs[$job_name]}"
                  run_ids[$job_name]=$(dispatch_child "$job_name" "$sleep_s" "$fail_pct")
                  echo "   → New run ID: ${run_ids[$job_name]}"
                  echo ""
                  all_done=false
                else
                  echo "💥 ${job_name} (run ${run_id}) failed — no retries left"
                fi
              else
                # Still running
                all_done=false
              fi
            done
          done

          # --- Final report ---
          echo ""
          echo "📊 Final Results:"
          any_failed=false
          for job_name in "${!run_ids[@]}"; do
            run_id=${run_ids[$job_name]}
            conclusion=$(gh run view "${run_id}" --json conclusion --jq '.conclusion')
            retry_count=${retries[$job_name]}
            echo "  ${job_name}: ${conclusion} (${retry_count} retries, run ${run_id})"
            if [ "${conclusion}" != "success" ]; then
              any_failed=true
            fi
          done

          if [ "${any_failed}" = "true" ]; then
            echo ""
            echo "💥 Some children failed after all retries"
            exit 1
          fi
          echo ""
          echo "✅ All children passed!"

  # ---------------------------------------------------------------------------
  # STRATEGY 2: continue-on-error + Retry Gate
  #
  # Jobs run with continue-on-error: true so the workflow doesn't block.
  # Each job outputs its real pass/fail status. A final "retry-gate" job
  # checks which jobs failed and re-runs them via the Actions API.
  # ---------------------------------------------------------------------------
  s2-fast-job:
    name: "S2 · Fast Job"
    if: inputs.strategy == 'continue-on-error'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      real-status: ${{ steps.work.outcome }}
    steps:
      - name: Do work
        id: work
        run: |
          set -euo pipefail
          echo "⚡ Fast job running..."
          sleep 5
          exit $((RANDOM % 3 == 0 ? 1 : 0))

  s2-slow-job:
    name: "S2 · Slow Job"
    if: inputs.strategy == 'continue-on-error'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      real-status: ${{ steps.work.outcome }}
    steps:
      - name: Do work
        id: work
        run: |
          set -euo pipefail
          echo "🐢 Slow job running..."
          sleep 30
          exit $((RANDOM % 5 == 0 ? 1 : 0))

  s2-flaky-job:
    name: "S2 · Flaky Job"
    if: inputs.strategy == 'continue-on-error'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    outputs:
      real-status: ${{ steps.work.outcome }}
    steps:
      - name: Do work
        id: work
        run: |
          set -euo pipefail
          echo "🎰 Flaky job running..."
          sleep 3
          exit $((RANDOM % 2))

  s2-retry-gate:
    name: "S2 · Retry Gate"
    if: inputs.strategy == 'continue-on-error' && always()
    needs: [s2-fast-job, s2-slow-job, s2-flaky-job]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results and re-run failures
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          FAST_STATUS: ${{ needs.s2-fast-job.outputs.real-status }}
          SLOW_STATUS: ${{ needs.s2-slow-job.outputs.real-status }}
          FLAKY_STATUS: ${{ needs.s2-flaky-job.outputs.real-status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "📊 Job Results:"
          echo "  Fast:  ${FAST_STATUS}"
          echo "  Slow:  ${SLOW_STATUS}"
          echo "  Flaky: ${FLAKY_STATUS}"

          failed=false
          for status in "${FAST_STATUS}" "${SLOW_STATUS}" "${FLAKY_STATUS}"; do
            if [ "${status}" = "failure" ]; then
              failed=true
              break
            fi
          done

          if [ "${failed}" = "true" ]; then
            echo ""
            echo "❌ Some jobs failed. In production, you would call:"
            echo "   gh run rerun ${RUN_ID} --failed"
            echo ""
            echo "⚠️  Note: continue-on-error masks the real status in check runs."
            echo "   This is the main trade-off of this strategy."
          else
            echo ""
            echo "✅ All jobs passed!"
          fi

  # ---------------------------------------------------------------------------
  # STRATEGY 3: Step-Level Retry
  #
  # Three sub-approaches:
  #   a) Inline bash retry loop with exponential backoff
  #   b) nick-fields/retry — community standard for retrying commands
  #   c) Wandalen/wretry.action — can also retry `uses:` action steps
  # ---------------------------------------------------------------------------
  s3-inline-retry:
    name: "S3 · Inline Bash Retry"
    if: inputs.strategy == 'step-retry'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Retry with exponential backoff
        run: |
          set -uo pipefail
          max_attempts=3
          attempt=1
          backoff=2

          until [ "${attempt}" -gt "${max_attempts}" ]; do
            echo "🔄 Attempt ${attempt}/${max_attempts}..."

            # Simulate a flaky command
            if (( RANDOM % 3 != 0 )); then
              echo "✅ Command succeeded on attempt ${attempt}"
              exit 0
            fi

            echo "❌ Attempt ${attempt} failed"
            if [ "${attempt}" -lt "${max_attempts}" ]; then
              echo "⏳ Waiting ${backoff}s before retry..."
              sleep "${backoff}"
              backoff=$((backoff * 2))
            fi
            attempt=$((attempt + 1))
          done

          echo "💥 All ${max_attempts} attempts failed"
          exit 1

  s3-nick-fields-retry:
    name: "S3 · nick-fields/retry"
    if: inputs.strategy == 'step-retry'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Retry a flaky command
        # nick-fields/retry v4.0.0
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60
        with:
          timeout_minutes: 2
          max_attempts: 3
          retry_wait_seconds: 5
          command: |
            echo "🎲 Rolling the dice..."
            exit $((RANDOM % 3 == 0 ? 1 : 0))

  s3-wretry:
    name: "S3 · Wandalen/wretry.action"
    if: inputs.strategy == 'step-retry'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # wretry can retry `uses:` action steps — not just shell commands.
      # This is useful for retrying actions like checkout on network flakes.
      - name: Retry a command with wretry
        # Wandalen/wretry.action v3.8.0
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea
        with:
          attempt_limit: 3
          attempt_delay: 5000
          command: |
            echo "🎲 Rolling the dice (wretry)..."
            exit $((RANDOM % 3 == 0 ? 1 : 0))

      - name: Retry a uses action step (checkout)
        # wretry's killer feature: retry `uses:` steps, not just commands
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea
        with:
          action: actions/checkout@v4
          attempt_limit: 3
          attempt_delay: 2000
          with: |
            fetch-depth: 1

  # ---------------------------------------------------------------------------
  # STRATEGY 4: Matrix Attempts
  #
  # Uses strategy.matrix with attempt: [1, 2, 3] and max-parallel: 1.
  # Attempt 1 always runs. If it succeeds, it uploads a success marker artifact.
  # Attempts 2+ check for the marker and skip if found.
  #
  # Trade-off: we use continue-on-error so early attempt failures don't
  # mark the workflow as failed. A final "verdict" job checks the marker
  # to determine the real outcome.
  # ---------------------------------------------------------------------------
  s4-matrix-retry:
    name: "S4 · Attempt ${{ matrix.attempt }}"
    if: inputs.strategy == 'matrix-retry'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        attempt: [1, 2, 3]
    steps:
      - name: Check if previous attempt succeeded
        if: matrix.attempt != 1
        id: check-marker
        uses: actions/download-artifact@v4
        with:
          name: success-marker
          path: /tmp/marker
        continue-on-error: true

      - name: Skip if already succeeded
        if: matrix.attempt != 1 && steps.check-marker.outcome == 'success'
        run: |
          echo "✅ A previous attempt already succeeded — skipping"
          echo "SKIP=true" >> "$GITHUB_ENV"

      - name: Do work
        if: env.SKIP != 'true'
        id: work
        run: |
          set -euo pipefail
          echo "🔧 Matrix attempt ${{ matrix.attempt }} running..."
          sleep 5

          # ~50% chance of failure
          if (( RANDOM % 2 == 0 )); then
            echo "💥 Attempt ${{ matrix.attempt }} failed!"
            exit 1
          fi
          echo "✅ Attempt ${{ matrix.attempt }} succeeded!"

      - name: Create marker file
        if: env.SKIP != 'true' && steps.work.outcome == 'success'
        run: |
          mkdir -p /tmp/marker
          echo "passed" > /tmp/marker/result.txt

      - name: Upload success marker
        if: env.SKIP != 'true' && steps.work.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: success-marker
          path: /tmp/marker
          retention-days: 1
          overwrite: true

  s4-verdict:
    name: "S4 · Verdict"
    if: inputs.strategy == 'matrix-retry' && always()
    needs: [s4-matrix-retry]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if any attempt succeeded
        id: check
        uses: actions/download-artifact@v4
        with:
          name: success-marker
          path: /tmp/marker
        continue-on-error: true

      - name: Report result
        env:
          CHECK_OUTCOME: ${{ steps.check.outcome }}
        run: |
          set -euo pipefail
          if [ "${CHECK_OUTCOME}" = "success" ]; then
            echo "✅ At least one matrix attempt succeeded!"
          else
            echo "💥 All matrix attempts failed!"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # STRATEGY 5: Watcher Rerun Workflow
  #
  # Most production-ready pattern. On failure, dispatches a separate
  # job-restart-rerun.yml that:
  #   1) gh run watch — blocks until this workflow concludes
  #   2) gh run rerun --failed — re-runs only the failed jobs
  #
  # Solves the "run cannot be rerun; its workflow file may be broken" error.
  # Attempt-limited via fromJSON(github.run_attempt) < 3.
  # ---------------------------------------------------------------------------
  s5-fast-job:
    name: "S5 · Fast Job"
    if: inputs.strategy == 'watcher-rerun'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Do work
        run: |
          set -euo pipefail
          echo "⚡ Fast job (attempt ${{ github.run_attempt }})"
          sleep 3
          exit $((RANDOM % 3 == 0 ? 1 : 0))

  s5-slow-job:
    name: "S5 · Slow Job"
    if: inputs.strategy == 'watcher-rerun'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Do work
        run: |
          set -euo pipefail
          echo "🐢 Slow job (attempt ${{ github.run_attempt }})"
          sleep 20
          exit $((RANDOM % 5 == 0 ? 1 : 0))

  s5-rerun-on-failure:
    name: "S5 · Rerun Dispatcher"
    if: inputs.strategy == 'watcher-rerun' && failure() && fromJSON(github.run_attempt) < 3
    needs: [s5-fast-job, s5-slow-job]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch watcher rerun workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REF: ${{ github.head_ref || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          echo "🔄 Attempt ${{ github.run_attempt }} had failures."
          echo "📡 Dispatching watcher rerun workflow..."
          gh workflow run job-restart-rerun.yml \
            --ref "${REF}" \
            -F "run_id=${RUN_ID}"
          echo "✅ Watcher dispatched — it will wait for this run to conclude, then rerun failed jobs."
