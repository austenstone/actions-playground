# =============================================================================
# PROBLEM: Sharing generated secrets/tokens between jobs via outputs
# =============================================================================
# GitHub Actions automatically masks any value that matches a registered secret.
# The masking engine is aggressive — if a job output VALUE happens to match
# (or contain) ANY secret in the repo, the entire output gets replaced with
# "***" in the consuming job. This breaks legitimate use cases like:
#
#   - Generating a short-lived token in Job A and using it in Job B
#   - Passing dynamic credentials between jobs
#   - Sharing API responses that coincidentally contain secret substrings
#
# The output looks fine in Job A, but arrives as "***" in Job B.
# See: https://github.com/orgs/community/discussions/13082
#
# WORKAROUND: Base64-encode the value before setting it as an output.
# The encoded string won't match any registered secret, so it passes
# through unmasked. The consuming job decodes it back to the original value.
# =============================================================================

name: "Exp: Share Secrets Between Jobs"

on:
  workflow_dispatch:
    inputs:
      demo-mode:
        description: "Show the problem (broken) or the workaround (fixed)"
        required: true
        type: choice
        options:
          - fixed
          - broken
        default: fixed

jobs:
  # ===========================================================================
  # Job 1: Generate a token and expose it as an output
  # ===========================================================================
  generate-token:
    name: "Generate Token"
    runs-on: ubuntu-latest
    outputs:
      # The raw token (will get masked if it matches any secret substring)
      raw-token: ${{ steps.raw.outputs.token }}
      # The base64-encoded token (survives masking)
      encoded-token: ${{ steps.encoded.outputs.token }}
    steps:
      - name: Generate a short-lived token
        id: generate
        run: |
          # Simulate generating a token (e.g., from an API, OIDC exchange, vault)
          # In real life this might be: curl -s https://vault/v1/auth/token/create
          TOKEN="ghp_$(openssl rand -hex 20)"
          echo "Generated token: ${TOKEN:0:10}..."

          # Store for subsequent steps
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      # BROKEN: Set the raw value as output — may get masked in consuming job
      - name: "Set output (raw — may break)"
        id: raw
        run: |
          echo "token=${{ steps.generate.outputs.token }}" >> "$GITHUB_OUTPUT"
          echo "::notice::Raw token set as output"

      # FIXED: Base64-encode to avoid the masking engine
      - name: "Set output (base64-encoded — safe)"
        id: encoded
        run: |
          ENCODED=$(echo -n "${{ steps.generate.outputs.token }}" | base64 -w 0)
          echo "token=$ENCODED" >> "$GITHUB_OUTPUT"
          echo "::notice::Encoded token set as output"

  # ===========================================================================
  # Job 2: Consume the token
  # ===========================================================================
  use-token:
    name: "Use Token"
    runs-on: ubuntu-latest
    needs: generate-token
    steps:
      # Show what happens with the raw output (may be ***)
      - name: "Attempt raw token (may be masked)"
        run: |
          RAW_TOKEN="${{ needs.generate-token.outputs.raw-token }}"
          echo "## Raw Output Test" >> "$GITHUB_STEP_SUMMARY"
          if [ "$RAW_TOKEN" = "***" ] || [ -z "$RAW_TOKEN" ]; then
            echo "❌ Raw token was masked or empty: \`$RAW_TOKEN\`" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Raw token got masked by Actions secret engine"
          else
            echo "✅ Raw token survived (this time): \`${RAW_TOKEN:0:10}...\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      # The reliable approach: decode the base64 output
      - name: "Decode base64 token (always works)"
        id: decode
        run: |
          ENCODED="${{ needs.generate-token.outputs.encoded-token }}"
          DECODED=$(echo -n "$ENCODED" | base64 -d)
          echo "## Base64 Workaround Test" >> "$GITHUB_STEP_SUMMARY"
          echo "✅ Decoded token: \`${DECODED:0:10}...\`" >> "$GITHUB_STEP_SUMMARY"

          # Now use the token for whatever you need
          echo "::notice::Successfully recovered token via base64 decode"

          # Mask it in THIS job's logs if you want (optional)
          echo "::add-mask::$DECODED"
          echo "token=$DECODED" >> "$GITHUB_OUTPUT"

      - name: "Use the token"
        run: |
          echo "Token is ready to use for API calls, deployments, etc."
          echo "In a real workflow, you'd do something like:"
          echo '  curl -H "Authorization: Bearer $TOKEN" https://api.example.com'
