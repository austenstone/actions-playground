name: Jenkinsfile in Actions

on:
  push:
    branches: [main]
    paths:
      - 'Jenkinsfile'
      - '.github/workflows/jenkins-in-actions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jfr:
    name: Run Jenkinsfile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/jenkinsci/jenkinsfile-runner:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Jenkinsfile
        run: |
          /app/bin/jenkinsfile-runner \
            --jenkins-war /app/jenkins \
            --plugins /usr/share/jenkins/ref/plugins \
            --file ./Jenkinsfile
