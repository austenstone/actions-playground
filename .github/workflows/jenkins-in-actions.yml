name: Jenkinsfile in Actions
on:
  push:
  workflow_dispatch:
jobs:
  jfr-container-action-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Downloads the Jenkinsfile Runner JAR to the host
      - name: Setup Jenkinsfile Runner
        uses: jenkinsci/jfr-setup-action@master
        with:
          jenkins-version: 2.462.3

      # Runs the JAR directly on the host
      - name: Execute Pipeline
        uses: jenkinsci/jfr-runtime-action@master
        with:
          command: run
          jenkinsfile: Jenkinsfile