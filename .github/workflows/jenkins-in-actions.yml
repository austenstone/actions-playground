name: Jenkinsfile in Actions

on:
  push:
    branches: [main]
    paths:
      - 'Jenkinsfile'
      - '.github/workflows/jenkins-in-actions.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  jfr:
    name: Run Jenkinsfile
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Jenkinsfile Runner
        run: |
          set -euo pipefail
          JFR_VERSION="1.0-beta-32"
          curl -sL "https://github.com/jenkinsci/jenkinsfile-runner/releases/download/${JFR_VERSION}/jenkinsfile-runner-${JFR_VERSION}.zip" -o jfr.zip
          unzip -q jfr.zip
          chmod +x jenkinsfile-runner/bin/jenkinsfile-runner
          echo "=== JFR Directory Structure ==="
          ls -la jenkinsfile-runner/
          ls -la jenkinsfile-runner/bin/ || true

      - name: Run Jenkinsfile
        run: |
          set -euo pipefail
          ./jenkinsfile-runner/bin/jenkinsfile-runner \
            -w ./jenkinsfile-runner/war \
            -p ./jenkinsfile-runner/plugins \
            -f ./Jenkinsfile
