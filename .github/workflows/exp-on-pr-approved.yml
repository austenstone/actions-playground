# How do I trigger a workflow when a PR is approved?
# GitHub doesn't have a dedicated "PR approved" event, but you can use
# pull_request_review with a condition on the review state.
# See: https://github.com/orgs/community/discussions/25372
#
# Event: pull_request_review fires on submitted/edited/dismissed
# Filter: github.event.review.state == 'approved'

name: On PR Approved

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  on-approval:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Add 'approved' label
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) {
              core.info('No PR number found (manual dispatch without PR context)');
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['approved']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `✅ PR approved by @${context.payload.review?.user?.login || 'unknown'}. Ready for merge!`
            });

            core.info(`Labeled and commented on PR #${prNumber}`);
