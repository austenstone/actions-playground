# Secrets in Matrix Values — Workaround
# Reference: https://github.com/orgs/community/discussions/9003
#
# LIMITATION: You CANNOT reference secrets directly in a matrix definition.
# This DOES NOT work:
#
#   strategy:
#     matrix:
#       env: [dev, staging, prod]
#       include:
#         - env: dev
#           api_key: ${{ secrets.DEV_API_KEY }}    # ❌ Always evaluates to ""
#
# GitHub masks secrets from matrix expansion for security reasons.
#
# WORKAROUND: Use the matrix to carry identifiers (strings), then map those
# identifiers to actual secrets inside step-level `env:` blocks using
# conditional expressions or a mapping object.

name: "Exp: Secrets in Matrix"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment(s)"
        type: choice
        options:
          - all
          - dev
          - staging
          - prod
        default: all

jobs:
  deploy:
    name: "Deploy (${{ matrix.env }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ inputs.environment == 'all' && fromJSON('["dev","staging","prod"]') || fromJSON(format('["{0}"]', inputs.environment)) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ─── Approach 1: Map matrix identifier → secret via conditional expressions ───
      - name: Deploy to ${{ matrix.env }}
        env:
          # Map the matrix string to the correct secret
          API_KEY: >-
            ${{
              matrix.env == 'dev'     && secrets.DEV_API_KEY     ||
              matrix.env == 'staging' && secrets.STAGING_API_KEY  ||
              matrix.env == 'prod'    && secrets.PROD_API_KEY     ||
              ''
            }}
          API_URL: >-
            ${{
              matrix.env == 'dev'     && secrets.DEV_API_URL     ||
              matrix.env == 'staging' && secrets.STAGING_API_URL  ||
              matrix.env == 'prod'    && secrets.PROD_API_URL     ||
              ''
            }}
        run: |
          echo "Deploying to ${{ matrix.env }}"
          echo "API_URL is set: ${{ env.API_URL != '' }}"
          # Use $API_KEY and $API_URL in your deploy script
          # Never echo secrets — just confirm they're populated
          if [ -z "$API_KEY" ]; then
            echo "::warning::API_KEY not configured for ${{ matrix.env }}"
          else
            echo "API_KEY is set ✓"
          fi

      # ─── Approach 2: Use fromJSON to build a secret lookup map ───
      # This is cleaner when you have many secrets per environment
      - name: Deploy via lookup map
        env:
          DEPLOY_TOKEN: >-
            ${{ fromJSON(format('{{"dev":"{0}","staging":"{1}","prod":"{2}"}}',
              secrets.DEV_DEPLOY_TOKEN,
              secrets.STAGING_DEPLOY_TOKEN,
              secrets.PROD_DEPLOY_TOKEN
            ))[matrix.env] }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::warning::DEPLOY_TOKEN not configured for ${{ matrix.env }}"
          else
            echo "DEPLOY_TOKEN is set for ${{ matrix.env }} ✓"
          fi

  # ─── Approach 3: Use GitHub Environments (most secure, recommended) ───
  deploy-with-environments:
    name: "Deploy w/ Environment (${{ matrix.env }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ${{ inputs.environment == 'all' && fromJSON('["dev","staging","prod"]') || fromJSON(format('["{0}"]', inputs.environment)) }}
    # GitHub Environment — secrets are scoped automatically, no mapping needed
    environment: ${{ matrix.env }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy using environment-scoped secrets
        env:
          # These resolve to the environment-scoped secret automatically
          API_KEY: ${{ secrets.API_KEY }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Deploying to ${{ matrix.env }} environment"
          echo "Secrets are scoped to the '${{ matrix.env }}' GitHub Environment"
          echo "API_KEY set: ${{ env.API_KEY != '' }}"
