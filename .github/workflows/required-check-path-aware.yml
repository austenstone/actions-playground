name: Required Check (Handle Path Filtering)

# NEVER use on.pull_request.paths for required checks.
# If the workflow is skipped, the required check stays Pending forever.
# Instead, trigger unconditionally and detect changes inside a job.

on:
  pull_request:
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:

  # ──────────────────────────────────────────────
  # Option 1 — dorny/paths-filter (3k+ stars)
  #   Pros: YAML filter syntax, multiple named filter groups, predicate-quantifier
  #   Cons: third-party action, requires checkout
  # ──────────────────────────────────────────────
  detect-dorny:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
            docs:
              - 'docs/**'

  build-dorny:
    needs: detect-dorny
    if: needs.detect-dorny.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "dorny — src changed, running build"

  # ──────────────────────────────────────────────
  # Option 2 — tj-actions/changed-files (2.6k+ stars)
  #   Pros: rich outputs (added/modified/deleted/renamed), glob patterns
  #   Cons: third-party action, requires checkout (fetch-depth: 2)
  # ──────────────────────────────────────────────
  detect-tj:
    runs-on: ubuntu-latest
    outputs:
      src_changed: ${{ steps.changed.outputs.any_modified }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        id: changed
        with:
          files: |
            src/**
            package.json

  build-tj:
    needs: detect-tj
    if: needs.detect-tj.outputs.src_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "tj-actions — src changed, running build"

  # ──────────────────────────────────────────────
  # Option 3 — Native git diff (no third-party actions)
  #   Pros: zero dependencies, full control, works on all event types
  #   Cons: manual regex (no glob), requires checkout (fetch-depth: 0)
  # ──────────────────────────────────────────────
  detect-native:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          FILE_PATTERN: '^(src/|package\.json$)'
        run: |
          if [ -z "$BASE_SHA" ]; then
            git fetch origin "${{ github.event.repository.default_branch }}"
            BASE_SHA="$(git merge-base "$HEAD_SHA" "origin/${{ github.event.repository.default_branch }}")"
          fi
          changed=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA...$HEAD_SHA")
          echo "$changed"
          if echo "$changed" | grep -qE "$FILE_PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  build-native:
    needs: detect-native
    if: needs.detect-native.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "native git diff — src changed, running build"

  # ──────────────────────────────────────────────
  # Option 4 — gh pr diff --name-only
  #   Pros: no checkout needed, matches PR "Files changed" tab
  #   Cons: pull_request only (no merge_group/push)
  # ──────────────────────────────────────────────
  detect-gh-cli:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FILE_PATTERN: '^(src/|package\.json$)'
        run: |
          changed=$(gh pr diff "$PR_NUMBER" --name-only --repo "${{ github.repository }}")
          echo "$changed"
          if echo "$changed" | grep -qE "$FILE_PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  build-gh-cli:
    needs: detect-gh-cli
    if: needs.detect-gh-cli.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "gh pr diff — src changed, running build"

  # ──────────────────────────────────────────────
  # Option 5 — gh api REST endpoint (pulls/N/files)
  #   Pros: no checkout, paginates automatically, returns per-file status
  #   Cons: pull_request only (no merge_group/push)
  # ──────────────────────────────────────────────
  detect-gh-api:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.detect.outputs.relevant }}
    steps:
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
          FILE_PATTERN: '^(src/|package\.json$)'
        run: |
          changed=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate --jq '.[].filename')
          echo "$changed"
          if echo "$changed" | grep -qE "$FILE_PATTERN"; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  build-gh-api:
    needs: detect-gh-api
    if: needs.detect-gh-api.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "gh api pulls/N/files — src changed, running build"

  # ──────────────────────────────────────────────
  # Required gate job (pattern from github/github)
  #   This is the ONLY job marked as required in branch protection.
  #   Uses if: always() so it runs even when build jobs are skipped.
  #   Skipped jobs report "success" to needs, so we check explicitly.
  # ──────────────────────────────────────────────
  required-gate:
    runs-on: ubuntu-latest
    needs: [detect-dorny, build-dorny, detect-tj, build-tj, detect-native, build-native, detect-gh-cli, build-gh-cli, detect-gh-api, build-gh-api]
    if: always()
    steps:
      - run: |
          echo "dorny   — src=${{ needs.detect-dorny.outputs.src }}, build=${{ needs.build-dorny.result }}"
          echo "tj      — src=${{ needs.detect-tj.outputs.src_changed }}, build=${{ needs.build-tj.result }}"
          echo "native  — src=${{ needs.detect-native.outputs.relevant }}, build=${{ needs.build-native.result }}"
          echo "gh-cli  — src=${{ needs.detect-gh-cli.outputs.relevant }}, build=${{ needs.build-gh-cli.result }}"
          echo "gh-api  — src=${{ needs.detect-gh-api.outputs.relevant }}, build=${{ needs.build-gh-api.result }}"

          # Fail if any job failed or was cancelled (skipped is OK)
          failed=false
          for result in \
            "${{ needs.detect-dorny.result }}" \
            "${{ needs.detect-tj.result }}" \
            "${{ needs.detect-native.result }}" \
            "${{ needs.detect-gh-cli.result }}" \
            "${{ needs.detect-gh-api.result }}" \
            "${{ needs.build-dorny.result }}" \
            "${{ needs.build-tj.result }}" \
            "${{ needs.build-native.result }}" \
            "${{ needs.build-gh-cli.result }}" \
            "${{ needs.build-gh-api.result }}"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "::error::One or more jobs failed or were cancelled"
            exit 1
          fi
          echo "All checks passed (or correctly skipped)"
