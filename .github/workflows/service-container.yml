name: Service Containers

on: workflow_dispatch

jobs:
  container-job:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    services:
      nginx:
        image: nginx
        ports:
          - 8080:80
      
    steps:
      - run: sudo apt-get update && sudo apt-get install -y telnet
      - run: telnet nginx 80
