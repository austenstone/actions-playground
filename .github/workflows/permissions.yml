#https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs#example-setting-permissions-for-a-specific-job

name: Permissions

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  stale:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v5